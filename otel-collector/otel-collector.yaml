# OpenTelemetry Collector for catalystlab-shared namespace
# Receives traces from LLaMA Stack and Kagent agents, processes them,
# and exports to MLflow + Jaeger.
#
# Sources:
#   - LLaMA Stack (inference traces, gen_ai semantic conventions)
#   - Kagent agents (agent runtime traces, tool calls, LLM interactions)
#
# Pipeline: Sources → OTLP (gRPC/HTTP) → [filter → transform → batch] → MLflow + Jaeger + Tempo
#
# Key processors:
#   - filter/drop-probes: Drops readiness/liveness probe spans (GET /v1/models)
#   - transform: Injects mlflow.spanType from gen_ai semantic conventions,
#     and sets peer.service for Jaeger dependency graph edges
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: catalystlab-shared
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      filter/drop-probes:
        traces:
          span:
            # Drop LLaMA Stack readiness/liveness probe spans (GET /v1/models every 10-30s)
            # Without this filter, probes outnumber real traces ~150:1 within days.
            - 'name == "GET /v1/models"'
            - 'name == "GET /v1/models http send"'
            # Drop Kagent A2A health check probe spans (controller polls each agent every 15s)
            # 9 agents × 4 polls/min × 3 spans/poll = ~108 spans/min of noise.
            - 'name == "GET /.well-known/agent.json"'
            - 'name == "GET /.well-known/agent.json http send"'
            - 'name == "GET /.well-known/agent-card.json"'
            - 'name == "GET /.well-known/agent-card.json http send"'

      transform:
        trace_statements:
          - context: span
            statements:
              # --- MLflow span type injection ---
              # MLflow reads mlflow.spanType to populate the "Span Type" column.
              # openai-v2 instrumentation sets gen_ai.operation.name but NOT mlflow.spanType.
              # Map gen_ai.operation.name → mlflow.spanType so MLflow displays it.
              - set(attributes["mlflow.spanType"], "CHAT_MODEL") where attributes["gen_ai.operation.name"] == "chat"
              - set(attributes["mlflow.spanType"], "LLM") where attributes["gen_ai.operation.name"] == "text_completion"

              # --- Jaeger/Tempo service dependency graph ---
              # LLaMA Stack → vLLM edges: the openai-v2 instrumentation on LLaMA Stack
              # emits "chat" spans with server.address pointing at the vLLM service.
              # Match on server.address (new OTel semconv) for the outbound LLM call.
              - set(attributes["peer.service"], "vllm") where attributes["server.address"] != nil and IsMatch(attributes["server.address"], ".*qwen3-next-80b.*")
              # Also match embedding model calls to vLLM
              - set(attributes["peer.service"], "vllm-embedding") where attributes["server.address"] != nil and IsMatch(attributes["server.address"], ".*qwen3-embedding.*")
              # Legacy: match http.url for any direct HTTP spans to vLLM (e.g., probe checks)
              - set(attributes["peer.service"], "vllm") where attributes["http.url"] != nil and IsMatch(attributes["http.url"], ".*qwen3-next-80b.*")

              # --- Kagent agent → LLaMA Stack dependency edges ---
              # Kagent agents call LLaMA Stack's OpenAI-compatible API.
              # Set peer.service on spans with URLs pointing at LLaMA Stack
              # so Jaeger/Tempo show agent → llamastack edges.
              - set(attributes["peer.service"], "llamastack") where attributes["http.url"] != nil and IsMatch(attributes["http.url"], ".*llamastack.*8321.*")
              - set(attributes["peer.service"], "llamastack") where attributes["url.full"] != nil and IsMatch(attributes["url.full"], ".*llamastack.*8321.*")
              - set(attributes["peer.service"], "llamastack") where attributes["server.address"] != nil and IsMatch(attributes["server.address"], ".*llamastack.*")

      batch:

    exporters:
      # MLflow trace ingestion endpoint (experiment ID 1 = "llamastack-traces")
      # Renamed from deprecated "otlphttp" to "otlp_http"
      otlp_http:
        endpoint: "http://mlflow.catalystlab-shared.svc.cluster.local:5000"
        headers:
          x-mlflow-experiment-id: "1"

      # Jaeger for distributed trace visualization and dependency graphs
      # Renamed from deprecated "otlp/jaeger" to "otlp_grpc/jaeger"
      otlp_grpc/jaeger:
        endpoint: "http://jaeger-collector.catalystlab-shared.svc.cluster.local:4317"
        tls:
          insecure: true

      # Tempo for Grafana-native tracing (service graphs, node graph, dashboards)
      # Deployed by Gerald (2026-02-24). Grafana datasource already configured.
      otlp_grpc/tempo:
        endpoint: "http://tempo.catalystlab-shared.svc.cluster.local:4317"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [filter/drop-probes, transform, batch]
          exporters: [otlp_http, otlp_grpc/jaeger, otlp_grpc/tempo]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: catalystlab-shared
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          # Using contrib image for filter, transform processors
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
              name: grpc
              protocol: TCP
            - containerPort: 4318
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: catalystlab-shared
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: http
      port: 4318
      targetPort: 4318
      protocol: TCP
  type: ClusterIP
